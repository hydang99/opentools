name: Tool evaluation checks

on:
  pull_request:
    paths:
      - "src/opentools/tools/**"
      - "src/opentools/core/base.py"
      - "src/opentools/evaluation.py"
      - "src/opentools/external_scanners.py"
      - "src/opentools/security/**"
      - "src/opentools/conversion.py"
      - "src/opentools/inventory.py"
      - "src/opentools/mcp_server.py"
      - "src/opentools/schema_validation.py"
      - "src/opentools/cli.py"
      - "tests/**"
      - "requirements-mcp.txt"
      - ".github/workflows/tool-evaluation.yml"
  push:
    branches: [main]
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:
    inputs:
      tools:
        description: "Comma-separated low-risk tools to evaluate"
        required: false
        default: "Calculator_Tool"

permissions:
  contents: write
  pull-requests: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install framework and MCP test dependencies
        run: python -m pip install -r requirements-mcp.txt
      - name: Install external security scanners
        run: |
          python -m pip install bandit detect-secrets
          pipx install semgrep
          go install github.com/gitleaks/gitleaks/v8@v8.30.1
      - name: Run evaluation unit tests
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Inspect the toolbox without executing tool code
        run: python src/opentools/evaluation.py src/opentools/tools --json > tool-preflight.json
      - name: Run redacted external scanner layer
        run: python src/opentools/external_scanners.py src/opentools/tools --json > external-security-preflight.json
      - name: Publish preflight report for maintainer review
        uses: actions/upload-artifact@v4
        with:
          name: tool-preflight
          path: |
            tool-preflight.json
            external-security-preflight.json

  refresh-inventory:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      REFRESH_BRANCH: automation/tool-evaluation-refresh
      SELECTED_TOOLS: ${{ inputs.tools || 'Calculator_Tool' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies for scheduled low-risk tools
        run: python -m pip install pydantic python-dotenv
      - name: Fetch previous automation branch if present
        run: git fetch origin "refs/heads/$REFRESH_BRANCH:refs/remotes/origin/$REFRESH_BRANCH" || true
      - name: Create automation branch
        run: git switch -c "$REFRESH_BRANCH"
      - name: Evaluate selected tools and regenerate inventory
        run: >-
          PYTHONPATH=src python -m opentools.inventory
          --run-tests
          --tools "$SELECTED_TOOLS"
          --max-risk low
          --discard-raw-results
      - name: Upload generated inventory evidence
        uses: actions/upload-artifact@v4
        with:
          name: refreshed-tool-inventory
          path: |
            src/opentools/tools/evaluation_index.json
            src/opentools/tools/readme.md
      - name: Detect inventory changes
        id: changes
        run: |
          if git diff --quiet -- src/opentools/tools/evaluation_index.json src/opentools/tools/readme.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit and push refresh branch
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/opentools/tools/evaluation_index.json src/opentools/tools/readme.md
          git commit -m "chore: refresh tool evaluation inventory"
          git push --force-with-lease origin "HEAD:refs/heads/$REFRESH_BRANCH"
      - name: Open or update inventory pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh pr view "$REFRESH_BRANCH" >/dev/null 2>&1; then
            gh pr edit "$REFRESH_BRANCH" --title "chore: refresh tool evaluation inventory" --body "Automated low-risk tool evaluation and generated inventory refresh. Review observed results before merging."
          else
            gh pr create --base main --head "$REFRESH_BRANCH" --title "chore: refresh tool evaluation inventory" --body "Automated low-risk tool evaluation and generated inventory refresh. Review observed results before merging."
          fi
